<!DOCTYPE html>
<html xmlns="http://w3.org">
<head>
    <meta charset="UTF-8" />
    <title>My Microsoft Account - CodornizStore</title>
    <link href="//Microsoft.WinJS.2.0/css/ui-dark.css" rel="stylesheet" />
    <script src="//Microsoft.WinJS.2.0/js/base.js"></script>
    <script src="//Microsoft.WinJS.2.0/js/ui.js"></script>
    <style>
        html, body { margin: 0; background: url('images/storebgr.jpg') no-repeat fixed center / 100% 100% !important; background-color: #228B22 !important; color: #fff; font-family: 'Segoe UI', sans-serif; overflow-x: auto; overflow-y: hidden; width: 100vw; height: 100vh; }
        #topbar { height: 70px; background: #228B22; display: flex; align-items: center; padding: 0 40px 0 20px; box-sizing: border-box; width: max-content; min-width: 100%; position: absolute; top: 0; left: 0; z-index: 1000; }
        .topbar-codorniz-logo { height: 100%; width: auto; max-height: 70px; object-fit: contain; margin-right: 14px; cursor: pointer; }
        .store-brand { font-size: 24px; font-weight: 300; margin-right: 32px; cursor: pointer; }
        .page-title { font-size: 24px; font-weight: 200; cursor: pointer; margin-right: 30px; }
        .active-title { font-weight: bold; border-bottom: 4px solid #fff; padding-bottom: 4px; }
        #content { padding: 100px 80px 30px 80px; height: calc(100vh - 70px); box-sizing: border-box; display: block; opacity: 0; }
        .hub-title { font-weight: 200; font-size: 42px; margin-bottom: 25px; }
        .profile-container { background: rgba(0, 0, 0, 0.4); border: 2px solid rgba(255, 255, 255, 0.1); padding: 40px; max-width: 700px; display: flex; gap: 30px; align-items: center; }
        .avatar-box { width: 120px; height: 120px; background: #228B22; display: flex; align-items: center; justify-content: center; font-size: 48px; font-weight: 300; color: #fff; border: 2px solid rgba(255,255,255,0.4); }
        .profile-info h2 { font-weight: 300; font-size: 28px; margin: 0 0 8px 0; }
        .profile-info p { margin: 4px 0; color: #ccc; font-size: 14px; }
        .tag-badge { background: #0078d7; color: #fff; padding: 4px 12px; display: inline-block; font-size: 12px; font-weight: bold; margin-top: 10px; text-transform: uppercase; }
        .metro-activa { opacity: 1 !important; animation: metroEntrance 0.42s cubic-bezier(0.1, 0.9, 0.2, 1) forwards; }
        @keyframes metroEntrance { from { opacity: 0; transform: translateX(50px); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body>
    <div id="topbar">
        <img src="images/codorniz.png" class="topbar-codorniz-logo" onclick="window.location.href='default.html'">
        <div class="store-brand" onclick="window.location.href='default.html'">CodornizStore</div>
        <div class="page-title" onclick="window.location.href='AllApps.html'">Apps</div>
        <div class="page-title" onclick="window.location.href='ChartsPage.html'">Trending</div>
        <div class="page-title active-title" onclick="window.location.href='AccountPage.html'">My Account</div>
    </div>

    <div id="content">
        <h1 class="hub-title">Account Settings</h1>
        
        <!-- AUTO-ADAPTATION PANEL: Labels change automatically based on the user's Windows -->
        <div class="profile-container">
            <div class="avatar-box" id="user-initial">U</div>
            <div class="profile-info">
                <h2 id="user-type-label">Loading Account...</h2>
                <p><strong>Profile Name:</strong> <span id="user-display-name">Looking for name...</span></p>
                <p><strong>Associated Email:</strong> <span id="user-email-address">Signing in...</span></p>
                <p><strong>Network Ecosystem:</strong> CodornizCorp Hybrid Server</p>
                <p><strong>Server Status:</strong> Synchronized via GitHub CDN</p>
                <div class="tag-badge" id="user-tier-badge">Store Subscriber</div>
            </div>
        </div>
    </div>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            var labelTipo = document.getElementById("user-type-label");
            var nombreBox = document.getElementById("user-display-name");
            var emailBox = document.getElementById("user-email-address");
            var inicialBox = document.getElementById("user-initial");
            var badgeBox = document.getElementById("user-tier-badge");

            /* NATIVE WINRT API INJECTOR: Fetches real user data from logged-in Windows 10 */
            if (typeof Windows !== 'undefined' && Windows.System && Windows.System.UserProfile) {
                try {
                    var userProfile = Windows.System.UserProfile;
                    
                    // Get display name from Windows 10
                    userProfile.getDisplayNameAsync().then(function (name) {
                        if (name) {
                            nombreBox.innerText = name;
                            inicialBox.innerText = name.charAt(0).toUpperCase();
                        } else {
                            nombreBox.innerText = "Windows 10 User";
                        }
                    });

                    // Get main email from linked Microsoft account
                    userProfile.getDomainNameAsync().then(function (domain) {
                        if (domain) {
                            emailBox.innerText = domain;
                        } else {
                            emailBox.innerText = "Local Windows Account";
                        }
                    });

                    labelTipo.innerText = "Active Microsoft Account";
                    badgeBox.innerText = "Codorniz Gold Developer";
                    badgeBox.style.background = "#228B22";

                } catch (e) {
                    // Handle WinRT initialization failures
                    labelTipo.innerText = "Store Guest User";
                    nombreBox.innerText = "Disconnected Local User";
                    emailBox.innerText = "account@codornizstore.local";
                }
            } else {
                /* CHROME WEB COUNTER: If running in a browser, simulates a generic clean profile */
                labelTipo.innerText = "Microsoft Account (Web Mode)";
                nombreBox.innerText = "External Internet User";
                emailBox.innerText = "web.user@outlook.com";
                inicialBox.innerText = "W";
                badgeBox.innerText = "Store Public Guest";
            }

            // Triggers the Metro horizontal entrance animation in a controlled way
            setTimeout(function() {
                var content = document.getElementById("content");
                if (content) { content.classList.add("metro-activa"); }
            }, 50);
        });
    </script>
</body>
</html>
